<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    overflow-y: auto;
}

h1 {
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 15px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

img {
    margin-top: 10px;
    border-radius: 8px;
}

input {
    width: 70%;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 8px 12px;
    margin-left: 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #00c6ff;
}
</style>

</head>
<body>

<h1>📊 Admin Dashboard</h1>

<div class="container" id="list"></div>

<script>
async function loadData() {
    const res = await fetch("http://localhost:3000/feedback");
    const data = await res.json();

    const container = document.getElementById("list");
    container.innerHTML = "";

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${item.type} (ID: ${item.ticketId})</h3>
<p>${item.description}</p>
<p><b>Status:</b> ${item.status}</p>
            ${item.image ? `<img src="http://localhost:3000/uploads/${item.image}" width="200">` : ""}

            <br><br>
            <input id="reply-${item._id}" placeholder="Write reply...">
<button onclick="sendReply('${item._id}')">Reply</button>

<br><br>

<button onclick="updateStatus('${item._id}', 'In Progress')">In Progress</button>
<button onclick="updateStatus('${item._id}', 'Fixed')">Fixed</button>

            <p><b>Reply:</b> ${item.reply || "None"}</p>
        `;

        container.appendChild(div);
    });
}

async function sendReply(id) {
    const text = document.getElementById("reply-" + id).value;

    await fetch("http://localhost:3000/reply/" + id, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reply: text })
    });

    loadData();
}

loadData();
async function updateStatus(id, status) {
    await fetch("http://localhost:3000/status/" + id, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
    });

    loadData();
}
</script>
<script>
const password = prompt("Enter Admin Password:");

if (password !== "SameerOP123") {
    document.body.innerHTML = "<h1>Access Denied</h1>";
}
</script>

</body>
</html>
